apiVersion: v1
kind: Service
metadata:
  name: autoorch-webhook
  namespace: default
spec:
  selector:
    app: autoorch
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoorch-webhook
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: webhook
          image: autoorch-webhook:latest
          ports:
            - containerPort: 8080
          env:
            - name: ACTION_MODE
              value: "stub"
            - name: TARGET_WORKLOAD
              value: "controllable-backend"
