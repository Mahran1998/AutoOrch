apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: autoorch-m8-autoscale-route
  namespace: default
  labels:
    release: prometheus-stack
    purpose: autoorch-m8
spec:
  route:
    receiver: autoorch-webhook
    groupBy:
      - alertname
      - namespace
      - deployment
    groupWait: 0s
    groupInterval: 30s
    repeatInterval: 10m
    matchers:
      - name: alertname
        matchType: =
        value: AutoOrchScalePressure
      - name: service
        matchType: =
        value: controllable-backend
      - name: deployment
        matchType: =
        value: controllable-backend
  receivers:
    - name: autoorch-webhook
      webhookConfigs:
        - url: http://autoorch-webhook.default.svc.cluster.local:8080/alert
          sendResolved: true
          maxAlerts: 1
          timeout: 30s

