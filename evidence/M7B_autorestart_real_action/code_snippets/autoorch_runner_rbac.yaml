apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoorch-runner
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoorch-runner
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["controllable-backend"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoorch-runner
  namespace: default
subjects:
  - kind: ServiceAccount
    name: autoorch-runner
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: autoorch-runner

