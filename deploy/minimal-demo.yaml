apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend
spec:
  replicas: 1
  selector: { matchLabels: { app: demo-backend } }
  template:
    metadata: { labels: { app: demo-backend } }
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo:0.2.3
        args: ["-text=hello"]
        ports: [{ containerPort: 5678 }]
---
apiVersion: v1
kind: Service
metadata:
  name: demo-backend
spec:
  selector: { app: demo-backend }
  ports:
  - port: 80
    targetPort: 5678
