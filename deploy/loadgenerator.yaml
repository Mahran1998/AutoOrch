apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  labels:
    app: loadgenerator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      containers:
      - name: main
        image: loadgenerator:local-v2
        imagePullPolicy: IfNotPresent
        env:
        - name: TARGET
          value: "http://demo-backend:80/"   # update if you use other target
        - name: METRICS_PORT
          value: "8080"
        - name: RPS
          value: "50"
        - name: CONCURRENCY
          value: "25"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: loadgenerator-metrics
  labels:
    app: loadgenerator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: loadgenerator
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
