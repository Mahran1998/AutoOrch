apiVersion: v1
kind: Service
metadata:
  name: autoorch-webhook
  labels:
    app: autoorch
spec:
  selector:
    app: autoorch
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoorch-webhook
  labels:
    app: autoorch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoorch
  template:
    metadata:
      labels:
        app: autoorch
    spec:
      containers:
        - name: webhook
          image: autoorch-webhook:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: "dev"
            - name: PROM_BASE_URL
              value: "http://prometheus-stack-kube-prom-prometheus.monitoring:9090"
            - name: TARGET_NAMESPACE
              value: "default"
            - name: TARGET_WORKLOAD
              value: "controllable-backend"
            - name: TARGET_POD_REGEX
              value: "controllable-backend-.*"
            - name: ALLOWED_NAMESPACES
              value: "default"
            - name: ALLOWED_WORKLOADS
              value: "controllable-backend"
            - name: CPU_LIMIT_FALLBACK
              value: "0.5"
            - name: P_AUTO_SCALE_THRESHOLD
              value: "0.90"
            - name: P_AUTO_RESTART_THRESHOLD
              value: "0.90"
            - name: AUTOSCALE_MODEL_PATH
              value: "/app/webhook/models/autoscale_classifier.joblib"
            - name: AUTOSCALE_META_PATH
              value: "/app/webhook/models/autoscale_classifier_meta.json"
            - name: RESTART_MODEL_PATH
              value: "/app/webhook/models/restart_classifier.joblib"
            - name: RESTART_META_PATH
              value: "/app/webhook/models/restart_classifier_meta.json"
            - name: CONSECUTIVE_ESCALATION_COUNT
              value: "2"
            - name: CONSECUTIVE_MEMORY_SECONDS
              value: "300"
            - name: COOLDOWN_SECONDS
              value: "300"
            - name: MAX_REPLICAS
              value: "5"
            - name: ACTION_MODE
              value: "stub"
            - name: COLLECT_DIAGNOSTICS_ON_NOTIFY
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: autoorch-webhook
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: autoorch
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
