apiVersion: apps/v1
kind: Deployment
metadata:
  name: controllable-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controllable-backend
  template:
    metadata:
      labels:
        app: controllable-backend
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "5000"
        prometheus.io/scrape: "true"
    spec:
      containers:
      - name: backend
        image: controllable-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: controllable-backend
spec:
  selector:
    app: controllable-backend
  ports:
  - port: 5000
    targetPort: 5000
    name: http
